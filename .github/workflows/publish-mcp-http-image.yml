name: Publish mcp-http image

# Builds the Bun-based mcp-http docker image and pushes it to GHCR.
# Triggered on changes to the MCP transport code or the Dockerfile itself.
# Also runnable manually via workflow_dispatch.
#
# Image is consumed by snow-flow-enterprise's docker-compose `mcp-http`
# service (profile: mcp-http, opt-in).

on:
  push:
    branches:
      - main
    paths:
      - 'packages/opencode/src/servicenow/servicenow-mcp-unified/**'
      - 'packages/opencode/Dockerfile.mcp-http'
      - '.github/workflows/publish-mcp-http-image.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: latest + sha)'
        required: false
        default: 'latest'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.repository == 'groeimetai/snow-flow'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: packages/opencode
          file: packages/opencode/Dockerfile.mcp-http
          push: true
          tags: |
            ghcr.io/groeimetai/snow-flow-mcp-http:${{ github.event.inputs.tag || 'latest' }}
            ghcr.io/groeimetai/snow-flow-mcp-http:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
